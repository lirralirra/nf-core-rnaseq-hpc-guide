<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Illustration of FASTQ, reference genome, and GFF3 inputs flowing through the nf-core RNA-seq pipeline on HPC to produce a count matrix">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef7ef"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6fcf97"/>
      <stop offset="100%" stop-color="#2f7d4a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- decorative leaves -->
  <g opacity="0.18" fill="#6fcf97">
    <circle cx="120" cy="100" r="60"/>
    <circle cx="1180" cy="620" r="90"/>
    <circle cx="1150" cy="90" r="40"/>
  </g>

  <!-- Step 1: Input files -->
  <g transform="translate(80,260)">
    <rect width="220" height="200" rx="16" fill="#ffffff" stroke="#ddeedd" stroke-width="2"/>
    <text x="110" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">Inputs</text>

    <rect x="20" y="55" width="180" height="38" rx="8" fill="#eef7ef" stroke="#ddeedd"/>
    <text x="110" y="79" text-anchor="middle" font-family="monospace" font-size="14" fill="#1f5c54">FASTQ</text>

    <rect x="20" y="103" width="180" height="38" rx="8" fill="#eef7ef" stroke="#ddeedd"/>
    <text x="110" y="127" text-anchor="middle" font-family="monospace" font-size="14" fill="#1f5c54">Reference genome</text>

    <rect x="20" y="151" width="180" height="38" rx="8" fill="#eef7ef" stroke="#ddeedd"/>
    <text x="110" y="175" text-anchor="middle" font-family="monospace" font-size="14" fill="#1f5c54">GFF3 annotation</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="320" y1="360" x2="430" y2="360" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="430,360 415,350 415,370" fill="#2f7d4a"/>
  </g>

  <!-- Step 2: Pipeline on HPC -->
  <g transform="translate(450,210)">
    <rect width="320" height="300" rx="20" fill="#ffffff" stroke="#e7d8ff" stroke-width="2"/>
    <text x="160" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#4c1d95">nf-core/rnaseq</text>
    <text x="160" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">running on HPC</text>

    <!-- simple gears -->
    <g fill="#f4eeff" stroke="#e7d8ff" stroke-width="2">
      <circle cx="100" cy="160" r="40"/>
      <circle cx="200" cy="200" r="55"/>
      <circle cx="120" cy="250" r="28"/>
    </g>
    <g fill="#6b46c1">
      <circle cx="100" cy="160" r="6"/>
      <circle cx="200" cy="200" r="8"/>
      <circle cx="120" cy="250" r="4"/>
    </g>

    <rect x="40" y="270" width="240" height="14" rx="7" fill="#f4eeff"/>
    <rect x="40" y="270" width="170" height="14" rx="7" fill="#6b46c1"/>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="800" y1="360" x2="910" y2="360" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="910,360 895,350 895,370" fill="#2f7d4a"/>
  </g>

  <!-- Step 3: Count matrix -->
  <g transform="translate(940,250)">
    <rect width="260" height="220" rx="16" fill="#ffffff" stroke="#ddeedd" stroke-width="2"/>
    <text x="130" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">Count matrix</text>

    <g font-family="monospace" font-size="12" fill="#1f2933">
      <rect x="20" y="55" width="220" height="28" fill="#eef7ef"/>
      <text x="30" y="74">gene</text><text x="120" y="74">sample1</text><text x="190" y="74">sample2</text>

      <rect x="20" y="83" width="220" height="28" fill="#ffffff"/>
      <text x="30" y="102">Actb</text><text x="120" y="102">1452</text><text x="190" y="102">1389</text>

      <rect x="20" y="111" width="220" height="28" fill="#eef7ef"/>
      <text x="30" y="130">Gapdh</text><text x="120" y="130">980</text><text x="190" y="130">1010</text>

      <rect x="20" y="139" width="220" height="28" fill="#ffffff"/>
      <text x="30" y="158">Pten</text><text x="120" y="158">312</text><text x="190" y="158">298</text>

      <rect x="20" y="167" width="220" height="28" fill="#eef7ef"/>
      <text x="30" y="186">...</text><text x="120" y="186">...</text><text x="190" y="186">...</text>
    </g>
  </g>

  <!-- Title -->
  <text x="640" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#14532d">FASTQ → nf-core/rnaseq → Count Matrix</text>
</svg>
